<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CS:GO Кейсы | Открой легендарное оружие</title>
    <!-- Google Fonts & простой сброс стилей -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b0c10 0%, #161a22 100%);
            color: #eef2ff;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* Анимированный градиентный фон для акцентов */
        .glow-bg {
            background: radial-gradient(circle at 20% 30%, rgba(255, 180, 40, 0.08), transparent 60%);
        }

        /* Контейнер */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 2rem 0 1rem;
            border-bottom: 1px solid rgba(255, 215, 100, 0.3);
            margin-bottom: 2rem;
            backdrop-filter: blur(2px);
        }
        .title {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFA41C);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .sub {
            color: #a7b6d9;
            margin-top: 0.5rem;
            font-size: 1.2rem;
            font-weight: 500;
        }
        .badge {
            display: inline-block;
            background: rgba(255, 165, 0, 0.2);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(255, 180, 40, 0.6);
            margin-top: 1rem;
        }

        /* Фильтры (категории) */
        .filters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 3rem;
        }
        .filter-btn {
            background: rgba(20, 25, 35, 0.8);
            border: 1px solid #2d3748;
            padding: 0.6rem 1.6rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #cbd5e6;
            backdrop-filter: blur(4px);
        }
        .filter-btn.active {
            background: #f5a623;
            border-color: #ffcd7e;
            color: #0f1117;
            box-shadow: 0 0 12px rgba(245, 166, 35, 0.4);
        }
        .filter-btn:hover:not(.active) {
            background: #2a3649;
            border-color: #f5a623;
            color: white;
            transform: translateY(-2px);
        }

        /* Сетка карточек */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        /* Карточка кейса */
        .case-card {
            background: rgba(18, 22, 32, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(255, 200, 100, 0.25);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            box-shadow: 0 20px 30px -15px rgba(0, 0, 0, 0.5);
        }
        .case-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 180, 60, 0.6);
            box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 180, 60, 0.2);
        }
        .card-img {
            height: 180px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 12px;
        }
        /* имитация свечения редкости */
        .card-img::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
            pointer-events: none;
        }
        .series-badge {
            position: relative;
            z-index: 2;
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-left: 3px solid #f5a623;
        }
        .card-content {
            padding: 1.2rem 1.2rem 1.5rem;
        }
        .case-name {
            font-size: 1.55rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #fff, #ffdd99);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .case-desc {
            font-size: 0.85rem;
            color: #b9c3e0;
            margin: 0.5rem 0 0.9rem;
            line-height: 1.4;
        }
        .rarity-tag {
            display: inline-block;
            background: #2c2f3e;
            border-radius: 30px;
            padding: 0.25rem 0.8rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #ffcf8a;
            margin-bottom: 0.8rem;
            border: 1px solid #ffb34740;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            border-top: 1px dashed #2a3346;
            padding-top: 0.8rem;
        }
        .price {
            font-weight: 800;
            font-size: 1.3rem;
            color: #ffcd7a;
        }
        .key-icon {
            font-size: 0.8rem;
            background: #1e232f;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
        }
        .open-btn {
            background: #f5a623;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.8rem;
            color: #0f1117;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .open-btn:hover {
            background: #ffbc4a;
            transform: scale(1.02);
            box-shadow: 0 0 6px #ffbc4a;
        }

        /* Модальное окно (открытие кейса) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-family: 'Inter', monospace;
        }
        .modal-content {
            background: linear-gradient(135deg, #141a24, #0c101c);
            border-radius: 2rem;
            max-width: 380px;
            width: 90%;
            padding: 1.8rem 1.6rem;
            text-align: center;
            border: 1px solid rgba(255, 210, 90, 0.5);
            box-shadow: 0 30px 40px rgba(0,0,0,0.5);
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #ffcd8c;
        }
        .modal-item-img {
            width: 90px;
            height: 90px;
            background: #2f3545;
            margin: 1rem auto;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            background: radial-gradient(circle at 30% 20%, #ffd96633, #00000055);
            border: 1px solid #ffb347;
        }
        .modal-item-name {
            font-weight: 800;
            font-size: 1.5rem;
            margin: 0.5rem 0;
        }
        .modal-rarity {
            font-size: 0.9rem;
            margin-bottom: 1rem;
            color: #f5bc70;
        }
        .modal-close {
            background: #2c3548;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 3rem;
            font-weight: bold;
            margin-top: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        .modal-close:hover {
            background: #f5a623;
            color: #0b0e14;
        }
        footer {
            text-align: center;
            padding: 2rem 0 1rem;
            font-size: 0.8rem;
            color: #7e8aa8;
            border-top: 1px solid #1f2633;
            margin-top: 1rem;
        }
        @media (max-width: 640px) {
            .title { font-size: 2.3rem; }
            .container { padding: 1rem 1rem; }
        }
    </style>
</head>
<body>
<div class="glow-bg">
    <div class="container">
        <div class="header">
            <h1 class="title">🔐 CS:GO КЕЙСЫ</h1>
            <p class="sub">Легендарные контейнеры с редкими скинами</p>
            <div class="badge">✨ Официальная коллекция ✨</div>
        </div>

        <!-- Фильтр по сериям -->
        <div class="filters" id="filterContainer">
            <button class="filter-btn active" data-filter="all">Все кейсы</button>
            <button class="filter-btn" data-filter="classic">Classic</button>

            ⚡ Симуляция открытия кейсов CS:GO | Только визуальная демонстрация | Все предметы вымышленны ⚡
        </footer>
    </div>
</div>

<!-- Модальное окно открытия кейса -->
<div id="openModal" class="modal">
    <div class="modal-content">
        <h3>🔓 ОТКРЫТИЕ КЕЙСА</h3>

        <button class="modal-close" id="closeModalBtn">Закрыть</button>

</div>

<script>
    // ======================= ДАННЫЕ КЕЙСОВ CS:GO =======================
    const casesData = [

        {

            series: "danger",

        {
            id: 4,
            name: "Хрома 3 Кейс",
            series: "chroma",
            rarityLabel: "💠 Хромированный",
            shortDesc: "Стильные и агрессивные расцветки",
            imagePreview: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpovbSsLQJf3qr3czxb49Kzm5W0mKeNOr7UqWcEu5xxi-mVpNiijAOw-RFsZTr6JYGcN1JnZQmFr1K8yXns6P7p0A/360fx360f",
            possibleDrops: [
                { name: "M4A4 | Змеиный укус", rarity: "Запрещённое", icon: "🐍" },

            ]
        },
        {
            id: 5,
            name: "Кейс «Спектрум»",
            series: "classic",
            rarityLabel: "🎇 Легендарный",
            shortDesc: "Элегантные и яркие скины от сообщества",
            imagePreview: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpovbSsLQJf3qr3czxb49Kzm5W0mKeNOr7UqWcEu5xxi-mVpNiijAOw-RFsZTr6JYGcN1Y-a2qH_lK8kX3j7Pzq0FQ/360fx360f",
            possibleDrops: [
                { name: "P2000 | Империя", rarity: "Тайное", icon: "👑" },
                { name: "AUG | Рикошет", rarity: "Запрещённое", icon: "💢" }
            ]
        },
        {
            id: 6,
            name: "Кейс «Прорыв»",
            series: "danger",
            rarityLabel: "💥 Эксклюзив",
            shortDesc: "Новые скины с переработанным стилем",
            imagePreview: "https://community.akamai.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpovbSsLQJf3qr3czxb49Kzm5W0mKeNOr7UqWcEu5xxi-mVpNiijAOw-RFsZTr6JYGcN1Y-a2qH_lK8kX3j7Pzq0FQ/360fx360f",
            possibleDrops: [
                { name: "Nova | Древесина", rarity: "Промышленное", icon: "🌳" },
                { name: "SSG 08 | Смерч", rarity: "Армейское", icon: "🌪️" }
            ]
        }
    ];

    // Вспомогательная функция для случайного предмета из кейса
    function getRandomDrop(caseItem) {
        const drops = caseItem.possibleDrops;
        if (!drops || drops.length === 0) {
            return { name: "Скин по умолчанию", rarity: "Обычное", icon: "🔫" };
        }
        const randomIndex = Math.floor(Math.random() * drops.length);
        return drops[randomIndex];
    }

    // Рендер карточек по фильтру
    let currentFilter = "all";

    function renderCases() {
        const grid = document.getElementById("casesGrid");
        if (!grid) return;
        
        let filtered = [...casesData];
        if (currentFilter !== "all") {
            filtered = casesData.filter(c => c.series === currentFilter);
        }
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">🔍 Нет кейсов в этой категории</div>`;
            return;
        }
        
        grid.innerHTML = filtered.map(caseItem => {
            // картинка: если ссылка некорректная, используем заглушку
            const imgUrl = caseItem.imagePreview || "https://via.placeholder.com/360x180?text=CS:GO+CASE";
            return `
                <div class="case-card" data-case-id="${caseItem.id}">
                    <div class="card-img" style="background-image: url('${imgUrl}');">
                        <span class="series-badge">${caseItem.series.toUpperCase()} серия</span>
                    </div>
                    <div class="card-content">
                        <div class="case-name">${caseItem.name}</div>
                        <div class="rarity-tag">${caseItem.rarityLabel}</div>
                        <div class="case-desc">${caseItem.shortDesc}</div>
                        <div class="price-row">
                            <span class="price">🔑 1 ключ</span>
                            <button class="open-btn case-open" data-id="${caseItem.id}">🎲 Открыть кейс</button>
                        </div>
                    </div>
                </div>
            `;
        }).join("");
        
        // прикрепить события на кнопки открытия после рендера
        document.querySelectorAll(".case-open").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const caseId = parseInt(btn.getAttribute("data-id"));
                const selectedCase = casesData.find(c => c.id === caseId);
                if (selectedCase) {
                    openCaseModal(selectedCase);
                } else {
                    alert("Ошибка: кейс не найден");
                }
            });
        });
        
        // добавим анимацию клика по карточке для красоты (не обязательно)
        document.querySelectorAll(".case-card").forEach(card => {
            card.addEventListener("click", (e) => {
                // если клик не на кнопке - просто показываем вибрацию или ничего
                if (!e.target.classList.contains("open-btn") && !e.target.classList.contains("case-open")) {
                    const cardCaseId = card.getAttribute("data-case-id");
                    if(cardCaseId) {
                        const cid = parseInt(cardCaseId);
                        const targetCase = casesData.find(c => c.id === cid);
                        if(targetCase) openCaseModal(targetCase);
                    } else {
                        // fallback: ищем по тексту, но лучше переделать: добавим data атрибут при рендере - исправим
                        const possibleId = card.querySelector(".case-open")?.getAttribute("data-id");
                        if(possibleId) {
                            const cid2 = parseInt(possibleId);
                            const found = casesData.find(c => c.id === cid2);
                            if(found) openCaseModal(found);
                        }
                    }
                }
            });
        });
    }

    // Модалка с рандомным дропом
    function openCaseModal(caseData) {
        const modal = document.getElementById("openModal");
        const modalItemName = document.getElementById("modalItemName");
        const modalRaritySpan = document.getElementById("modalRarity");
        const modalItemIconSpan = document.getElementById("modalItemIcon");
        
        // получаем случайный дроп
        const drop = getRandomDrop(caseData);
        
        // анимация смены контента
        modalItemName.textContent = drop.name;
        modalRaritySpan.textContent = `★ ${drop.rarity} ★`;
        // Иконка или эмодзи
        modalItemIconSpan.innerHTML = drop.icon || "🎁";
        // дополнительная стилизация иконки
        modalItemIconSpan.style.fontSize = "3.5rem";
        
        // Показываем модалку
        modal.style.display = "flex";
        
        // Добавляем небольшую "сцену" открытия - эффект появления
        // чтобы было солиднее
    }
    
    // фильтр-обработчики
    function initFilters() {
        const filterBtns = document.querySelectorAll(".filter-btn");
        filterBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                const filterValue = btn.getAttribute("data-filter");
                if (!filterValue) return;
                currentFilter = filterValue;
                // обновить активную кнопку
                filterBtns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                renderCases();
            });
        });
    }
    
    // закрытие модалки
    function initModal() {
        const modal = document.getElementById("openModal");
        const closeBtn = document.getElementById("closeModalBtn");
        const closeOutside = (e) => {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        };
        closeBtn.addEventListener("click", () => {
            modal.style.display = "none";
        });
        window.addEventListener("click", closeOutside);
    }
    
    // инициализация и подгрузка изображений с возможной заменой нерабочих
    // (все img через background-image, ошибок не будет)
    
    // Добавим для карточек data-case-id чтобы работал клик по области
    function enhanceCardsDataAttr() {
        // после рендера привязываем data-case-id к карточке
        const setDataToCards = () => {
            const cards = document.querySelectorAll(".case-card");
            cards.forEach(card => {
                const openBtnInside = card.querySelector(".case-open");
                if(openBtnInside) {
                    const idVal = openBtnInside.getAttribute("data-id");
                    if(idVal) card.setAttribute("data-case-id", idVal);
                }
            });
        };
        // переопределим рендер через MutationObserver маленький костыль 
        const observer = new MutationObserver(() => {
            setDataToCards();
        });
        const grid = document.getElementById("casesGrid");
        if(grid) observer.observe(grid, { childList: true, subtree: true });
        setDataToCards();
    }

    // запуск приложения
    function init() {
        renderCases();
        initFilters();
        initModal();
        enhanceCardsDataAttr();
    }
    
    init();
</script>
</body>
</html>
